<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/formulario.css">
</head>
<body>
    <div class="container">
    <h2>Formulario de Productos</h2>

    <form action="" method="get" class="form-container" id="productoForm">
        <div class="form-group">
            <label for="nombre">Nombre del Producto:</label>
            <input type="text" id="nombre" placeholder="Ingresa el nombre del producto" required minlength="3" maxlength="20">
        </div>
        <div class="form-group">
            <label for="precio">Precio:</label>
            <input type="number" id="precio" placeholder="Ingresa el precio del producto" required min="1" step="100000000">
        </div>
        <div class="form-group">
            <label for="marca">Marca</label>
            <input type="text" id="marca" placeholder="Ingresa la marca" required>
        </div>

        <div class="form-group">
            <label for="categoria">Categoría:</label>
            <select id="categoria" required>
                <option value="">Selecciona una categoría</option>
                <option value="electronica">Electrónica</option>
                <option value="ropa">Ropa</option>
                <option value="hogar">Hogar</option>
                <option value="deportes">Deportes</option>
            </select>
        </div>

        <div class="form-group full-width">
            <label for="descripcion">Descripción:</label>
            <textarea id="descripcion" placeholder="Ingresa la descripción" required></textarea>
        </div>

        <div class="form-group full-width">
            <label for="imagen">Imagen del Producto:</label>
            <input type="file" id="imagen" accept="image/*" required>
            <img class="preview-img" id="previewImg" alt="Vista previa">
        </div>

        <div class="button-container">
            <button id="btnAgregar" type="submit">Agregar Producto</button>
        </div>
    </form>
    </div>
    <script src="js/formulario.js"></script>

    
</body>
</html>
